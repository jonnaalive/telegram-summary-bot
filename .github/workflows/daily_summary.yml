name: Daily Summary

on:
  schedule:
    # 매일 UTC 22:00 = KST 07:00
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decrypt Telethon session
        run: openssl enc -aes-256-cbc -d -salt -pbkdf2 -in telegram_summary_session.session.enc -out telegram_summary_session.session -pass pass:${{ secrets.SESSION_PASSWORD }}

      - name: Run summary bot
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OBSIDIAN_VAULT_PATH: ./summaries
          FOLDER_NAMES: ${{ secrets.FOLDER_NAMES }}
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
          GDRIVE_VAULT_FOLDER_ID: ${{ secrets.GDRIVE_VAULT_FOLDER_ID }}
        run: python run_once.py

      - name: Commit and push summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add summaries/ last_run.txt
          git diff --cached --quiet || git commit -m "📊 Daily summary $(date +%Y-%m-%d)"
          git push
